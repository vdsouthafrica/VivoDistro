<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent's Artists | Vivo Distro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
     <link rel="stylesheet" href="responsive.css"> <!-- YOUR NEW RESPONSIVE CSS -->
     <script src="global-fullscreen.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Header */
        .header {
            background: #151a2c;
            border-bottom: 1px solid #2a2f45;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .back-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a2f45;
            border-radius: 10px;
            color: #fff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(108,99,255,0.1);
            border-color: #6C63FF;
            transform: translateX(-5px);
        }
        
        .back-btn i {
            color: #6C63FF;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.3rem;
            font-weight: 600;
        }
        
        .logo i {
            color: #6C63FF;
            font-size: 1.6rem;
        }
        
        .logo-highlight {
            color: #6C63FF;
        }
        
        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }
        
        /* Agent Info Header */
        .agent-header {
            background: linear-gradient(135deg, #151a2c, #1e243b);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 40px;
            border: 1px solid #2a2f45;
            display: flex;
            gap: 40px;
            align-items: center;
        }
        
        .agent-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6C63FF, #FF6584);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #fff;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .agent-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .agent-info h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .agent-location {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #8892b0;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }
        
        .agent-location i {
            color: #6C63FF;
        }
        
        .agent-bio {
            color: #cbd5e0;
            line-height: 1.6;
            max-width: 600px;
        }
        
        .artist-count {
            display: inline-block;
            margin-top: 15px;
            padding: 8px 16px;
            background: rgba(108,99,255,0.15);
            border: 1px solid rgba(108,99,255,0.3);
            border-radius: 30px;
            color: #6C63FF;
            font-weight: 600;
        }
        
        .artist-count i {
            margin-right: 8px;
        }
        
        /* Section Title */
        .section-title {
            font-size: 2rem;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: #6C63FF;
        }
        
        /* Artists Grid */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
        }
        
        /* Artist Card */
        .artist-card {
            background: #151a2c;
            border-radius: 24px;
            padding: 25px;
            border: 1px solid #2a2f45;
            transition: all 0.3s ease;
        }
        
        .artist-card:hover {
            transform: translateY(-5px);
            border-color: #6C63FF;
            box-shadow: 0 20px 40px rgba(108,99,255,0.2);
        }
        
        .card-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .artist-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(108,99,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #6C63FF;
            overflow: hidden;
            flex-shrink: 0;
        }
        
        .artist-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .artist-info {
            flex: 1;
        }
        
        .artist-info h3 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #fff;
        }
        
        .artist-location {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #8892b0;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .artist-location i {
            color: #6C63FF;
        }
        
        .artist-types {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .type-tag {
            background: rgba(108,99,255,0.15);
            color: #6C63FF;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            border: 1px solid rgba(108,99,255,0.3);
        }
        
        .artist-bio {
            color: #cbd5e0;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .artist-social {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .social-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid #2a2f45;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8892b0;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            background: #6C63FF;
            color: #fff;
            border-color: #6C63FF;
            transform: translateY(-3px);
        }
        
        .card-footer {
            display: flex;
            gap: 12px;
            border-top: 1px solid #2a2f45;
            padding-top: 20px;
        }
        
        .chat-btn {
            flex: 1;
            padding: 12px;
            background: #6C63FF;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
        }
        
        .chat-btn:hover {
            background: #554fd8;
            transform: translateY(-2px);
        }
        
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px;
            background: #151a2c;
            border-radius: 20px;
            border: 2px dashed #2a2f45;
        }
        
        .empty-state i {
            font-size: 4rem;
            color: #6C63FF;
            opacity: 0.5;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        
        .empty-state p {
            color: #8892b0;
        }
        
        /* Loading State */
        .loading {
            text-align: center;
            padding: 60px;
            color: #8892b0;
        }
        
        .loading i {
            font-size: 2rem;
            color: #6C63FF;
            margin-bottom: 15px;
        }
        
        /* ========== MOBILE RESPONSIVE FIXES ========== */
        @media screen and (max-width: 768px) {
            .header {
                padding: 15px 20px;
            }
            
            .main-container {
                padding: 20px;
            }
            
            .agent-header {
                flex-direction: column;
                text-align: center;
                padding: 30px 20px;
                gap: 20px;
            }
            
            .agent-avatar {
                width: 100px;
                height: 100px;
                font-size: 2.5rem;
            }
            
            .agent-info h1 {
                font-size: 1.8rem;
            }
            
            .agent-location {
                font-size: 1rem;
                justify-content: center;
            }
            
            .agent-bio {
                font-size: 0.95rem;
                margin: 0 auto;
            }
            
            .section-title {
                font-size: 1.6rem;
                margin-bottom: 20px;
            }
            
            .artists-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .artist-card {
                padding: 20px;
            }
            
            .card-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 15px;
            }
            
            .artist-avatar {
                width: 90px;
                height: 90px;
                font-size: 2.2rem;
                margin: 0 auto;
            }
            
            .artist-info h3 {
                font-size: 1.3rem;
            }
            
            .artist-location {
                justify-content: center;
            }
            
            .artist-types {
                justify-content: center;
            }
            
            .artist-social {
                justify-content: center;
            }
            
            .card-footer {
                flex-direction: column;
                gap: 10px;
            }
            
            .chat-btn {
                width: 100%;
                padding: 14px;
            }
            
            .empty-state {
                padding: 40px 20px;
            }
            
            .empty-state i {
                font-size: 3rem;
            }
            
            .empty-state h3 {
                font-size: 1.5rem;
            }
            
            .loading {
                padding: 40px 20px;
            }
        }

        /* Extra small devices */
        @media screen and (max-width: 480px) {
            .agent-header {
                padding: 25px 15px;
            }
            
            .agent-avatar {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }
            
            .agent-info h1 {
                font-size: 1.5rem;
            }
            
            .artist-card {
                padding: 18px;
            }
            
            .artist-avatar {
                width: 80px;
                height: 80px;
                font-size: 2rem;
            }
            
            .artist-info h3 {
                font-size: 1.2rem;
            }
            
            .type-tag {
                font-size: 0.75rem;
                padding: 3px 8px;
            }
            
            .artist-bio {
                font-size: 0.85rem;
                -webkit-line-clamp: 2;
            }
            
            .social-icon {
                width: 32px;
                height: 32px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="javascript:history.back()" class="back-btn">
            <i class="fas fa-arrow-left"></i> <span>Back to Browse</span>
        </a>
        <div class="logo">
            <i class="fas fa-users"></i> <span>VIVO <span class="logo-highlight">ROSTER</span></span>
        </div>
    </header>

    <div class="main-container">
        <!-- Agent Info (will be filled by JS) -->
        <div class="agent-header" id="agentHeader" style="display: none;">
            <div class="agent-avatar" id="agentAvatar">
                <i class="fas fa-user-tie"></i>
            </div>
            <div class="agent-info">
                <h1 id="agentName">Loading...</h1>
                <div class="agent-location" id="agentLocation">
                    <i class="fas fa-map-marker-alt"></i> <span>Loading...</span>
                </div>
                <div class="agent-bio" id="agentBio"></div>
                <div class="artist-count" id="artistCount">
                    <i class="fas fa-users"></i> <span>0</span> Artists
                </div>
            </div>
        </div>

        <!-- Artists Grid -->
        <h2 class="section-title"><i class="fas fa-microphone"></i> Artists in Roster</h2>
        <div class="artists-grid" id="artistsGrid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading artists...</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const supabaseUrl = 'https://msjinuumxmezrijqemmp.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zamludXVteG1lenJpanFlbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTAyNjMsImV4cCI6MjA4NzY2NjI2M30.ic50fSC7MQfhSkhfE5E8B0R5-BGCQStMRZNHiy6Zakw';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

            // Get agent ID from URL
            const urlParams = new URLSearchParams(window.location.search);
            const agentId = urlParams.get('id');

            if (!agentId) {
                showError('No agent specified');
                return;
            }

            // Get current user (for chat functionality)
            const { data: { user } } = await supabaseClient.auth.getUser();

            // Load agent details
            await loadAgentDetails();
            
            // Load artists
            await loadArtists();

            async function loadAgentDetails() {
                const { data: agent, error } = await supabaseClient
                    .from('agents')
                    .select('*')
                    .eq('id', agentId)
                    .single();

                if (error || !agent) {
                    showError('Agent not found');
                    return;
                }

                // Show agent header
                document.getElementById('agentHeader').style.display = 'flex';
                
                // Set agent info
                document.getElementById('agentName').textContent = agent.name || 'Agency Name';
                document.getElementById('agentLocation').innerHTML = 
                    `<i class="fas fa-map-marker-alt"></i> <span>${agent.location || 'Location not set'}</span>`;
                document.getElementById('agentBio').textContent = agent.bio || 'No bio added yet';

                // Set agent avatar
                if (agent.logo_url) {
                    document.getElementById('agentAvatar').innerHTML = 
                        `<img src="${agent.logo_url}" alt="${agent.name}">`;
                }
            }

            async function loadArtists() {
                const { data: artists, error } = await supabaseClient
                    .from('roster_artists')
                    .select('*')
                    .eq('agent_id', agentId)
                    .order('created_at', { ascending: false });

                if (error) {
                    console.error('Error loading artists:', error);
                    showError('Failed to load artists');
                    return;
                }

                // Update artist count
                document.querySelector('#artistCount span').textContent = artists.length;

                if (artists.length === 0) {
                    document.getElementById('artistsGrid').innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <h3>No Artists in Roster</h3>
                            <p>This agent hasn't added any artists yet</p>
                        </div>
                    `;
                    return;
                }

                renderArtists(artists);
            }

            function renderArtists(artists) {
                const grid = document.getElementById('artistsGrid');
                
                grid.innerHTML = artists.map(artist => {
                    // Get social icons HTML
                    const socialHTML = artist.social_links?.map(link => {
                        const icons = {
                            'instagram': 'fab fa-instagram',
                            'facebook': 'fab fa-facebook',
                            'twitter': 'fab fa-twitter',
                            'tiktok': 'fab fa-tiktok',
                            'youtube': 'fab fa-youtube',
                            'spotify': 'fab fa-spotify',
                            'soundcloud': 'fab fa-soundcloud',
                            'website': 'fas fa-globe'
                        };
                        return `<a href="${link.url}" target="_blank" class="social-icon"><i class="${icons[link.platform] || 'fas fa-link'}"></i></a>`;
                    }).join('') || '';

                    return `
                        <div class="artist-card">
                            <div class="card-header">
                                <div class="artist-avatar">
                                    ${artist.image_url 
                                        ? `<img src="${artist.image_url}" alt="${artist.name}">` 
                                        : '<i class="fas fa-user"></i>'}
                                </div>
                                <div class="artist-info">
                                    <h3>${artist.name}</h3>
                                    <div class="artist-location">
                                        <i class="fas fa-map-marker-alt"></i> ${artist.location || 'Location not set'}
                                    </div>
                                </div>
                            </div>

                            <div class="artist-types">
                                ${artist.types?.map(type => 
                                    `<span class="type-tag">${type}</span>`
                                ).join('') || '<span class="type-tag">Performer</span>'}
                            </div>

                            <div class="artist-bio">
                                ${artist.bio || 'No bio added yet'}
                            </div>

                            ${socialHTML ? `<div class="artist-social">${socialHTML}</div>` : ''}

                            <div class="card-footer">
                                <button class="chat-btn" onclick="startChat('${artist.id}', '${artist.name.replace(/'/g, "\\'")}')">
                                    <i class="fas fa-comment"></i> Book ${artist.name.split(' ')[0]}
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            // Global chat function
            window.startChat = function(artistId, artistName) {
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                // Get agent name from header
                const agentName = document.getElementById('agentName').textContent;
                
                // Create pre-filled message
                const message = encodeURIComponent(
                    `Hi ${agentName}, I would like to book ${artistName} for an event. ` +
                    `Can we discuss availability and pricing?`
                );
                
                // In a real app, this would create a conversation with the agent
                // For now, we'll just go to chat with the artist ID in context
                window.location.href = `vivo-chat.html?artist=${artistId}&message=${message}`;
            };

            function showError(message) {
                document.getElementById('artistsGrid').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle" style="color: #F56565;"></i>
                        <h3>Error</h3>
                        <p>${message}</p>
                        <a href="javascript:history.back()" class="back-btn" style="display: inline-flex; margin-top: 20px;">
                            <i class="fas fa-arrow-left"></i> Go Back
                        </a>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
