<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Viewer | Vivo Distro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="settings.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background: #0a0e1a; color: #fff; min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #6C63FF; border-radius: 10px; }

        .profile-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* Hero Banner */
        .profile-hero {
            height: 350px; border-radius: 30px; position: relative; background: #151a2c;
            overflow: hidden; margin-bottom: 90px; border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .hero-banner-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: opacity 0.5s; }
        .hero-banner-img.placeholder { opacity: 0.3; }

        .profile-main-info {
            position: absolute; bottom: -60px; left: 40px; display: flex;
            align-items: flex-end; gap: 25px; z-index: 10;
        }
        .profile-avatar-wrapper {
            width: 180px; height: 180px; border-radius: 45px; border: 8px solid #0a0e1a;
            background: #151a2c; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        .profile-avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .profile-title-area { margin-bottom: 60px; }
        .profile-name { font-size: 2.8rem; font-weight: 800; margin-bottom: 8px; text-shadow: 0 4px 15px rgba(0,0,0,0.5); letter-spacing: -1px; }
        .profile-tagline { 
            color: #8892b0; font-size: 1.1rem; display: flex; align-items: center; gap: 12px;
            background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; width: fit-content; backdrop-filter: blur(5px);
        }

        /* Layout Grid */
        .profile-content-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 30px; }
        .glass-card { 
            background: rgba(21, 26, 44, 0.4); backdrop-filter: blur(20px); border-radius: 28px;
            border: 1px solid rgba(255,255,255,0.05); padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 25px; display: flex; align-items: center; gap: 12px; color: #fff; letter-spacing: 0.5px; }
        .card-title i { font-size: 1.1rem; color: #6C63FF; }

        .bio-text { line-height: 1.8; color: #b0b8d1; font-size: 1.05rem; white-space: pre-wrap; }
        .performer-types-grid { display: flex; flex-wrap: wrap; gap: 12px; }
        .type-badge {
            background: rgba(108, 99, 255, 0.1); color: #a5a0ff; padding: 10px 18px;
            border-radius: 14px; font-size: 0.95rem; font-weight: 600; border: 1px solid rgba(108, 99, 255, 0.2);
            display: flex; align-items: center; gap: 8px;
        }

        /* Action Buttons */
        .action-stack { display: flex; flex-direction: column; gap: 27px; margin-top: 20px; }
        .btn-profile-primary {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: linear-gradient(135deg, #6C63FF, #FF6584); color: white;
            font-size: 1.1rem; font-weight: 750; cursor: pointer; display: flex;
            align-items: center; justify-content: center; gap: 12px; transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(108,99,255,0.3); text-transform: uppercase;
        }
        .btn-profile-primary:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(108,99,255,0.5); }
        .btn-profile-secondary {
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; font-size: 1rem; font-weight: 650;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s;
        }
        .btn-profile-secondary:hover { background: rgba(255,255,255,0.1); border-color: #6C63FF; }

        /* Rating Highlight */
        .rating-box { text-align: center; margin-bottom: 30px; padding: 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); }
        .big-rating { font-size: 2.5rem; font-weight: 800; color: #fff; display: block; }
        .rating-stars-row { color: #FFD700; font-size: 1.2rem; margin: 8px 0; }
        .rating-label { font-size: 0.85rem; color: #8892b0; text-transform: uppercase; font-weight: 600; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-card { background: #151a2c; width: 100%; max-width: 500px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .modal-header { padding: 20px; background: rgba(108,99,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 25px; max-height: 80vh; overflow-y: auto; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #8892b0; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .connect-option { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 20px; border-radius: 18px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: all 0.2s; }
        .connect-option:hover { background: rgba(108,99,255,0.1); border-color: #6C63FF; transform: translateY(-3px); }
        .connect-option i { font-size: 1.5rem; color: #6C63FF; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 30px; border-radius: 15px; color: white; z-index: 11000; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        #pageLoader { position: fixed; inset: 0; background: #0a0e1a; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-logo { font-size: 2rem; font-weight: 800; }
        .loader-logo span { color: #6C63FF; }

        .back-nav-btn {
            position: fixed; top: 25px; left: 25px; z-index: 1000;
            width: 45px; height: 45px; background: rgba(21, 26, 44, 0.6);
            backdrop-filter: blur(10px); border-radius: 50%; border: 1px solid rgba(255,255,255,0.1);
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
        }
        .back-nav-btn:hover { background: #6C63FF; transform: scale(1.1); }

        .role-badge-pill {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .badge-performer { background: rgba(108, 99, 255, 0.2); color: #a5a0ff; border-color: rgba(108, 99, 255, 0.3); }
        .badge-agent { background: rgba(255, 101, 132, 0.2); color: #ff8ca3; border-color: rgba(255, 101, 132, 0.3); }
        .badge-booker { background: rgba(72, 187, 120, 0.2); color: #9ae6b4; border-color: rgba(72, 187, 120, 0.3); }

        @media (max-width: 950px) {
            .profile-content-grid { grid-template-columns: 1fr; }
            .profile-main-info { left: 20px; flex-direction: column; align-items: flex-start; bottom: -140px; }
            .profile-hero { margin-bottom: 200px; height: 300px; }
            .profile-avatar-wrapper { width: 150px; height: 150px; border-radius: 35px; }
            .profile-name { font-size: 2.2rem; }
            .back-nav-btn { top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

    <div id="pageLoader">
        <div class="loader-logo">VIVO <span>DISTRO</span></div>
    </div>

    <a href="javascript:smartBack()" class="back-nav-btn"><i class="fas fa-arrow-left"></i></a>

    <!-- Modals -->
    <div class="modal" id="connectModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="connectTitle">Contact Artist</h3>
                <button onclick="closeModal()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="modal" id="commentsModal">
        <div class="modal-card">
            <div class="modal-header">
                <h3>Artist Reviews</h3>
                <button onclick="closeCommentsModal()" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem;">✕</button>
            </div>
            <div class="modal-body" id="commentsBody"></div>
        </div>
    </div>

    <div class="profile-container">
        <header class="profile-hero">
            <img src="https://images.unsplash.com/photo-1514525253361-bee8a48790c3?auto=format&fit=crop&q=80&w=2000" id="heroImage" class="hero-banner-img placeholder">
            <div class="profile-main-info">
                <div class="profile-avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=User&background=6C63FF&color=fff" id="profileAvatar">
                </div>
                <div class="profile-title-area">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:5px;">
                        <h1 class="profile-name" id="profileName">Loading...</h1>
                        <span class="role-badge-pill" id="roleBadge">Syncing...</span>
                    </div>
                    <div class="profile-tagline">
                        <span id="profileLocation">Syncing data...</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="profile-content-grid">
            <div class="main-column">
                <div class="glass-card">
                    <h3 class="card-title"><i class="fas fa-file-alt"></i> Biography</h3>
                    <div class="bio-text" id="profileBio">Syncing story...</div>
                </div>
                <div class="glass-card">
                    <h3 class="card-title"><i class="fas fa-drum"></i> Focus & Categories</h3>
                    <div class="performer-types-grid" id="profileTypes"></div>
                </div>

                <div class="glass-card" id="socialCard" style="display: none;">
                    <h3 class="card-title"><i class="fas fa-link"></i> Social Media & Links</h3>
                    <div class="performer-types-grid" id="profileSocials" style="gap: 15px;"></div>
                </div>
            </div>

            <div class="side-column">
                <div class="glass-card">
                    <div class="rating-box">
                        <span class="big-rating" id="ratingValue">0.0</span>
                        <div class="rating-stars-row" id="avgRatingStars"></div>
                        <span class="rating-label">Platform Rating</span>
                    </div>
                    <div class="action-stack">
                        <button class="btn-profile-primary" id="btnBook"><i class="fas fa-calendar-check"></i> Book Talent</button>
                        <button class="btn-profile-secondary" id="btnViewRoster" style="display:none;"><i class="fas fa-users"></i> View Roster</button>
                        <button class="btn-profile-secondary" id="btnViewTechList"><i class="fas fa-microchip"></i> View TechList</button>
                        <button class="btn-profile-secondary" id="btnShareProfileAction"><i class="fas fa-share-alt"></i> Share Profile Link</button>
                        <button class="btn-profile-secondary" id="btnViewComments"><i class="fas fa-star"></i> View Comments</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://msjinuumxmezrijqemmp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zamludXVteG1lenJpanFlbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTAyNjMsImV4cCI6MjA4NzY2NjI2M30.ic50fSC7MQfhSkhfE5E8B0R5-BGCQStMRZNHiy6Zakw';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentPerformer = null;
        let currentUserId = null;
        let currentProfileType = 'performer';

        async function smartBack() {
            try {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (user) {
                    const roles = { 'performers': 'performer-hub.html', 'agents': 'agent-hub.html', 'bookers': 'booker-hub.html' };
                    for (const [table, page] of Object.entries(roles)) {
                        const { data } = await supabaseClient.from(table).select('id').eq('auth_id', user.id).maybeSingle();
                        if (data) { window.location.href = page; return; }
                    }
                }
                if (document.referrer && document.referrer.includes(window.location.hostname)) {
                    history.back();
                } else {
                    window.location.href = 'browse.html';
                }
            } catch (e) {
                window.location.href = 'browse.html';
            }
        }

        async function initProfile() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetId = urlParams.get('id');

            const { data: { user } } = await supabaseClient.auth.getUser();
            currentUserId = user?.id;

            if (!targetId) { window.location.href = "browse.html"; return; }

            try {
                let profile = null;
                const roles = ['performers', 'agents', 'bookers'];
                
                for (const role of roles) {
                    const { data } = await supabaseClient
                        .from(role)
                        .select('*')
                        .or(`id.eq.${targetId},auth_id.eq.${targetId}`)
                        .maybeSingle();
                    
                    if (data) { 
                        profile = data; 
                        currentProfileType = role.slice(0, -1);
                        break; 
                    }
                }

                if (!profile) {
                    document.getElementById('profileName').textContent = "Profile Not Found";
                    document.getElementById('roleBadge').textContent = "Error";
                    hideLoader();
                    return;
                }

                currentPerformer = profile;
                document.getElementById('profileName').textContent = profile.name || profile.business_name || 'Anonymous User';
                const badge = document.getElementById('roleBadge');
                badge.textContent = currentProfileType;
                badge.className = `role-badge-pill badge-${currentProfileType}`;

                document.getElementById('profileLocation').textContent = profile.location || 'Global User';
                document.getElementById('profileBio').textContent = profile.bio || 'No details shared yet.';
                
                const typeTitle = document.querySelector('.main-column .glass-card:nth-child(2) .card-title');
                if (currentProfileType === 'performer') {
                    typeTitle.innerHTML = '<i class="fas fa-drum"></i> Focus & Categories';
                } else if (currentProfileType === 'agent') {
                    typeTitle.innerHTML = '<i class="fas fa-users"></i> Agent Focus / Roster Type';
                } else {
                    typeTitle.innerHTML = '<i class="fas fa-building"></i> Booking Specialization';
                }

                if (profile.image_url || profile.logo_url) {
                    document.getElementById('profileAvatar').src = profile.image_url || profile.logo_url;
                }
                
                if (profile.banner_url || profile.header_url) {
                    const banner = document.getElementById('heroImage');
                    banner.src = profile.banner_url || profile.header_url;
                    banner.classList.remove('placeholder');
                } else {
                    // Fallback to a default aesthetic if no banner
                    document.getElementById('heroImage').src = 'https://images.unsplash.com/photo-1514525253361-bee8a48790c3?auto=format&fit=crop&q=80&w=2000';
                }

                const typesGrid = document.getElementById('profileTypes');
                const specs = profile.types || profile.specialties || profile.services || [];
                if (specs.length > 0) {
                    typesGrid.innerHTML = specs.map(t => `<span class="type-badge"><i class="fas fa-check-circle"></i> ${t}</span>`).join('');
                } else { 
                    typesGrid.innerHTML = `<p style="color:#8892b0">Professional ${currentProfileType} verified.</p>`; 
                }


                // Social Links
                const socialsGrid = document.getElementById('profileSocials');
                const socialCard = document.getElementById('socialCard');
                if (profile.social_links && profile.social_links.length > 0) {
                    socialCard.style.display = 'block';
                    const platformMap = {
                        'instagram': { icon: 'fab fa-instagram', color: '#E1306C' },
                        'facebook': { icon: 'fab fa-facebook', color: '#1877F2' },
                        'twitter': { icon: 'fab fa-twitter', color: '#1DA1F2' },
                        'youtube': { icon: 'fab fa-youtube', color: '#FF0000' },
                        'spotify': { icon: 'fab fa-spotify', color: '#1DB954' },
                        'soundcloud': { icon: 'fab fa-soundcloud', color: '#ff5500' },
                        'tiktok': { icon: 'fab fa-tiktok', color: '#fff' },
                        'website': { icon: 'fas fa-globe', color: '#6C63FF' }
                    };
                    
                    socialsGrid.innerHTML = profile.social_links.map(link => {
                        let purl = link.url;
                        if (!purl.startsWith('http')) purl = 'https://' + purl;
                        const iconData = platformMap[link.platform] || { icon: 'fas fa-link', color: '#6C63FF' };
                        return `<a href="${purl}" target="_blank" style="display:flex; align-items:center; justify-content:center; width:45px; height:45px; background:rgba(255,255,255,0.05); border-radius:50%; text-decoration:none; color:${iconData.color}; font-size:1.3rem; transition:all 0.3s; border:1px solid rgba(255,255,255,0.1);" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.transform='translateY(-3px)';" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.transform='none';"><i class="${iconData.icon}"></i></a>`;
                    }).join('');
                } else {
                    if (socialCard) socialCard.style.display = 'none';
                }


                const { data: ratingData, error: ratingError } = await supabaseClient
                    .from('ratings')
                    .select('rating')
                    .eq('rated_user_id', profile.auth_id);

                let avgRating = 0;
                if (!ratingError && ratingData && ratingData.length > 0) {
                    const sum = ratingData.reduce((acc, curr) => acc + curr.rating, 0);
                    avgRating = sum / ratingData.length;
                }
                document.getElementById('ratingValue').textContent = avgRating.toFixed(1);
                renderStars(avgRating);

                const btnBook = document.getElementById('btnBook');
                const btnViewRoster = document.getElementById('btnViewRoster');
                const isSelf = currentUserId && (currentUserId === profile.auth_id);

                if (isSelf) {
                    // Viewing your own profile — disable interactive buttons
                    btnBook.disabled = true;
                    btnBook.style.opacity = '0.4';
                    btnBook.style.cursor = 'not-allowed';
                    btnBook.innerHTML = '<i class="fas fa-user"></i> Your Profile';
                } else {
                    if (currentProfileType === 'performer') {
                        btnBook.innerHTML = '<i class="fas fa-calendar-check"></i> Book Talent';
                    } else if (currentProfileType === 'agent') {
                        btnBook.innerHTML = '<i class="fas fa-link"></i> Connect with Agent';
                    } else {
                        btnBook.innerHTML = '<i class="fas fa-handshake"></i> Send Proposal';
                    }
                    document.getElementById('btnBook').onclick = () => openModal();
                }

                // Show Roster button only for agents
                if (currentProfileType === 'agent') {
                    btnViewRoster.style.display = 'flex';
                    btnViewRoster.onclick = () => window.location.href = `agent-roster-view.html?id=${profile.id}`;
                }

                document.getElementById('btnViewTechList').style.display = currentProfileType === 'performer' ? 'flex' : 'none';
                document.getElementById('btnViewTechList').onclick = () => window.location.href = `techlist-view.html?id=${profile.id}`;
                document.getElementById('btnShareProfileAction').onclick = shareProfileLink;
                document.getElementById('btnViewComments').onclick = () => viewComments(profile.auth_id);

                hideLoader();
            } catch (err) { console.error(err); hideLoader(); }
        }

        function shareProfileLink() {
            const shareUrl = window.location.href;
            navigator.clipboard.writeText(shareUrl).then(() => showToast("Profile link copied!", "success"));
        }

        function renderStars(rating) {
            const container = document.getElementById('avgRatingStars');
            let starsHTML = '';
            for (let i = 1; i <= 5; i++) {
                if (rating >= i) starsHTML += '<i class="fas fa-star"></i>';
                else if (rating >= i - 0.5) starsHTML += '<i class="fas fa-star-half-alt"></i>';
                else starsHTML += '<i class="far fa-star"></i>';
            }
            container.innerHTML = starsHTML;
        }

        function renderStarsHTML(rating) {
            let s = '';
            for(let i=1; i<=5; i++){
                if(i <= rating) s += '<i class="fas fa-star"></i>';
                else if(i <= rating + 0.5) s += '<i class="fas fa-star-half-alt"></i>';
                else s += '<i class="far fa-star"></i>';
            }
            return s;
        }

        async function viewComments(userId) {
            const modal = document.getElementById('commentsModal');
            const body = document.getElementById('commentsBody');
            modal.classList.add('active');
            body.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i> Fetching reviews...</div>';
            try {
                const { data, error } = await supabaseClient.from('ratings').select('*').eq('rated_user_id', userId).order('created_at', { ascending: false });
                if (error) throw error;
                if (!data || data.length === 0) {
                    body.innerHTML = `<div style="text-align:center; padding:40px; color:#8892b0;"><i class="fas fa-star" style="font-size:2rem; margin-bottom:15px; opacity:0.3;"></i><p>No reviews yet for this artist.</p></div>`;
                    return;
                }
                body.innerHTML = data.map(c => `<div style="background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:12px;"><div style="display:flex; justify-content:space-between; margin-bottom:8px;"><div style="color:#FFD700; font-size:0.9rem;">${renderStarsHTML(c.rating)}</div><span style="color:#8892b0; font-size:0.8rem;">${new Date(c.created_at).toLocaleDateString()}</span></div><p style="color:#b0b8d1; line-height:1.5; font-size:0.95rem;">${c.comment || 'No written review.'}</p></div>`).join('');
            } catch (err) { body.innerHTML = `<p style="color:#F56565; text-align:center;">Error loading reviews.</p>`; }
        }

        function closeCommentsModal() { document.getElementById('commentsModal').classList.remove('active'); }
        function openModal() {
            if (currentUserId && currentPerformer && currentUserId === currentPerformer.auth_id) {
                showToast("You can't contact yourself", "error");
                return;
            }
            document.getElementById('connectModal').classList.add('active');
            showOptions();
        }
        function closeModal() { document.getElementById('connectModal').classList.remove('active'); }

        function showOptions() {
            const name = currentPerformer.name || currentPerformer.business_name;
            document.getElementById('connectTitle').textContent = `Contact ${name}`;
            const bookLabel = currentProfileType === 'booker' ? 'Send Proposal' : currentProfileType === 'agent' ? 'Book via Agent' : 'Book Talent';
            const bookDesc = currentProfileType === 'agent' ? 'Choose a performer from this roster' : 'Send a full booking request';
            document.getElementById('modalBody').innerHTML = `
                <div class="connect-option" onclick="showBookingForm()"><i class="fas fa-calendar-check"></i><div><h4>${bookLabel}</h4><p>${bookDesc}</p></div></div>
                <div class="connect-option" onclick="showChatForm()"><i class="fas fa-comment"></i><div><h4>Direct Message</h4><p>Send a quick message</p></div></div>
                <div class="connect-option" onclick="handleShareProfile()"><i class="fas fa-id-card"></i><div><h4>Share Profile</h4><p>Send your profile card</p></div></div>
            `;
        }

        async function handleShareProfile() {
            if(!currentUserId){ showToast("Please login first", "error"); return; }
            if(currentUserId === currentPerformer.auth_id){ showToast("You can't send to yourself", "error"); return; }
            try {
                let myProfile = null;
                for (let table of ['performers', 'agents', 'bookers']) {
                    const { data } = await supabaseClient.from(table).select('*').eq('auth_id', currentUserId).maybeSingle();
                    if (data) { myProfile = data; break; }
                }
                if (!myProfile) { showToast('Complete your profile first', 'error'); return; }
                await supabaseClient.from('inbox_items').insert([{
                    sender_id: currentUserId, recipient_id: currentPerformer.auth_id, recipient_name: currentPerformer.name || currentPerformer.business_name,
                    sender_profile: myProfile, type: 'profile', status: 'pending', created_at: new Date().toISOString()
                }]);
                showToast("Profile shared successfully!", "success"); closeModal();
            } catch(e) { showToast("Error sharing profile", "error"); }
        }

        function showBookingForm() {
            if (currentProfileType === 'agent') {
                // For agents: first show roster picker
                showAgentRosterPicker();
                return;
            }
            renderBookingForm(null);
        }

        async function showAgentRosterPicker() {
            document.getElementById('modalBody').innerHTML = `
                <div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin" style="font-size:1.5rem; color:#6C63FF;"></i><p style="margin-top:10px; color:#8892b0;">Loading roster...</p></div>`;
            try {
                // Step 1: get the agent's row id using auth_id
                const { data: agentRow } = await supabaseClient
                    .from('agents')
                    .select('id')
                    .eq('auth_id', currentPerformer.auth_id)
                    .maybeSingle();

                if (!agentRow) {
                    document.getElementById('modalBody').innerHTML = `
                        <p style="color:#8892b0; text-align:center; padding:20px;">Could not find agent profile.</p>
                        <button type="button" class="btn-profile-secondary" onclick="showOptions()" style="width:100%; margin-top:10px;"><i class="fas fa-arrow-left"></i> Back</button>`;
                    return;
                }

                // Step 2: query the roster_artists table by agent_id
                const { data: artists } = await supabaseClient
                    .from('roster_artists')
                    .select('id, name, image_url')
                    .eq('agent_id', agentRow.id)
                    .order('name', { ascending: true });

                const rosterArtists = artists || [];

                if (rosterArtists.length === 0) {
                    document.getElementById('modalBody').innerHTML = `
                        <p style="color:#8892b0; text-align:center; padding:20px;">This agent has no performers on their roster yet.</p>
                        <button type="button" class="btn-profile-secondary" onclick="showOptions()" style="width:100%; margin-top:10px;"><i class="fas fa-arrow-left"></i> Back</button>`;
                    return;
                }

                const rosterHtml = rosterArtists.map(p => `
                    <div class="connect-option" onclick="renderBookingForm('${p.id}', '${(p.name || '').replace(/'/g, "\\'")}', '${p.image_url || ''}')" 
                         style="align-items:center; gap:15px;">
                        <div style="width:48px; height:48px; border-radius:50%; overflow:hidden; border:2px solid rgba(108,99,255,0.4); flex-shrink:0; background:rgba(108,99,255,0.1); display:flex; align-items:center; justify-content:center;">
                            ${p.image_url ? `<img src="${p.image_url}" style="width:100%; height:100%; object-fit:cover;">` : `<i class="fas fa-user" style="color:#6C63FF;"></i>`}
                        </div>
                        <div><h4 style="margin:0;">${p.name || 'Performer'}</h4><p style="margin:0; font-size:0.8rem; color:#8892b0;">Tap to book this artist</p></div>
                    </div>`).join('');

                document.getElementById('modalBody').innerHTML = `
                    <p style="color:#8892b0; font-size:0.9rem; margin-bottom:15px;">Select the performer you wish to book through this agent:</p>
                    ${rosterHtml}
                    <button type="button" class="btn-profile-secondary" onclick="showOptions()" style="width:100%; margin-top:10px;"><i class="fas fa-arrow-left"></i> Back</button>`;
            } catch (err) {
                console.error('Roster load error:', err);
                document.getElementById('modalBody').innerHTML = `<p style="color:#F56565; text-align:center;">Error loading roster.</p>`;
            }
        }

        window.renderBookingForm = function(performerId, performerName, performerImg) {
            const agentPickerHtml = (currentProfileType === 'agent' && performerId) ? `
                <div style="display:flex; align-items:center; gap:12px; background:rgba(108,99,255,0.08); border:1px solid rgba(108,99,255,0.2); border-radius:14px; padding:12px; margin-bottom:18px;">
                    <div style="width:40px; height:40px; border-radius:50%; overflow:hidden; border:2px solid #6C63FF; flex-shrink:0; background:rgba(108,99,255,0.1); display:flex; align-items:center; justify-content:center;">
                        ${performerImg ? `<img src="${performerImg}" style="width:100%; height:100%; object-fit:cover;">` : `<i class="fas fa-user" style="color:#6C63FF; font-size:0.9rem;"></i>`}
                    </div>
                    <div><p style="margin:0; font-size:0.75rem; color:#8892b0;">Booking performer:</p><p style="margin:0; font-weight:700; color:#fff;">${performerName}</p></div>
                    <button type="button" onclick="showAgentRosterPicker()" style="margin-left:auto; background:none; border:1px solid rgba(255,255,255,0.1); color:#8892b0; border-radius:8px; padding:4px 10px; cursor:pointer; font-size:0.75rem;">Change</button>
                </div>` : '';

            document.getElementById('modalBody').innerHTML = `
                <form id="bookingForm" onsubmit="handleBooking(event, '${performerId || ''}', '${(performerName || '').replace(/'/g, "\\'")}')">
                    ${agentPickerHtml}
                    <div class="form-group"><label><i class="fas fa-calendar-alt"></i> Event Name *</label><input type="text" id="evName" placeholder="e.g. Summer Festival" maxlength="30" required></div>
                    <div class="form-group"><label><i class="fas fa-map-pin"></i> Venue *</label><input type="text" id="evVenue" maxlength="30" required></div>
                    <div class="form-group"><label><i class="fas fa-location-dot"></i> Location (City, State) *</label><input type="text" id="evLocation" placeholder="e.g. NY" maxlength="30" required></div>
                    <div class="form-row">
                        <div class="form-group"><label>Date *</label><input type="date" id="evDate" required></div>
                        <div class="form-group"><label>Start Time *</label><input type="time" id="evStartTime" required></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>End Time</label><input type="time" id="evEndTime"></div>
                        <div class="form-group"><label>Indoor / Outdoor</label>
                            <select id="evVenueType" style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; outline:none;">
                                <option value="Indoor">Indoor</option>
                                <option value="Outdoor">Outdoor</option>
                                <option value="Both">Both</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>Expected Attendance *</label><input type="number" id="evAtt" required></div>
                        <div class="form-group"><label>Contact *</label><input type="tel" id="evContact" maxlength="15" required></div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <button type="button" class="btn-profile-secondary" onclick="${currentProfileType === 'agent' ? 'showAgentRosterPicker()' : 'showOptions()'}"><i class="fas fa-arrow-left"></i> Back</button>
                        <button type="submit" class="btn-profile-primary">Send Request</button>
                    </div>
                </form>`;
        };

        async function handleBooking(e, performerId, performerName) {
            e.preventDefault();
            if(!currentUserId){ showToast("Please login first", "error"); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...'; btn.disabled = true;
            try {
                await supabaseClient.from('inbox_items').insert([{
                    sender_id: currentUserId,
                    recipient_id: currentPerformer.auth_id,
                    recipient_name: currentPerformer.name || currentPerformer.business_name,
                    event_name: document.getElementById('evName').value,
                    venue: document.getElementById('evVenue').value,
                    event_date: document.getElementById('evDate').value,
                    start_time: document.getElementById('evStartTime').value,
                    sender_phone: document.getElementById('evContact').value,
                    sender_profile: {
                        event_name: document.getElementById('evName').value,
                        venue: document.getElementById('evVenue').value,
                        location: document.getElementById('evLocation').value,
                        event_date: document.getElementById('evDate').value,
                        start_time: document.getElementById('evStartTime').value,
                        end_time: document.getElementById('evEndTime').value,
                        venue_type: document.getElementById('evVenueType').value,
                        expected_attendance: document.getElementById('evAtt').value,
                        sender_phone: document.getElementById('evContact').value,
                        ...(performerId ? { requested_performer_id: performerId, requested_performer_name: performerName } : {})
                    },
                    type: 'booking', status: 'pending', created_at: new Date().toISOString()
                }]);
                showToast("Request sent!", "success"); closeModal();
            } catch(err){ showToast("Error", "error"); btn.disabled = false; btn.innerHTML = 'Send Request'; }
        }

        function showChatForm() {
            document.getElementById('modalBody').innerHTML = `
                <form id="chatForm" onsubmit="handleChat(event)">
                    <div class="form-group"><label>Message (max 300 words)</label><textarea id="chatMsg" rows="4" placeholder="Write..." style="resize:none;" oninput="validateWords(this)" required></textarea></div>
                    <div class="form-group"><label>Contact *</label><input type="tel" id="chatContact" maxlength="15" required></div>
                    <div style="display:flex; gap:10px;"><button type="button" class="btn-profile-secondary" onclick="showOptions()">Back</button><button type="submit" class="btn-profile-primary">Send Message</button></div>
                </form>
            `;
        }
        window.validateWords = (el) => { let words = el.value.match(/\S+/g); if(words && words.length > 300) { el.value = words.slice(0, 300).join(' ') + ' '; el.style.borderColor = '#F56565'; } else { el.style.borderColor = 'rgba(255,255,255,0.1)'; } };

        async function handleChat(e) {
            e.preventDefault();
            if(!currentUserId){ showToast("Please login first", "error"); return; }
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>...'; btn.disabled = true;
            try {
                await supabaseClient.from('inbox_items').insert([{
                    sender_id: currentUserId, recipient_id: currentPerformer.auth_id, recipient_name: currentPerformer.name || currentPerformer.business_name,
                    message: document.getElementById('chatMsg').value, sender_profile: { sender_phone: document.getElementById('chatContact').value },
                    type: 'chat', status: 'pending', created_at: new Date().toISOString()
                }]);
                showToast("Message sent!", "success"); closeModal();
            } catch(e){ showToast("Error", "error"); btn.disabled = false; }
        }

        function showToast(msg, type) {
            const t = document.createElement('div'); t.className = 'toast';
            t.style.background = type === 'success' ? '#48BB78' : '#F56565';
            t.textContent = msg; document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function hideLoader() { setTimeout(() => { const l = document.getElementById('pageLoader'); if(l){ l.style.opacity='0'; setTimeout(()=>l.remove(),500); } }, 800); }
        initProfile();
    </script>
    <script src="settings-manager.js"></script>
    <script src="navbar.js"></script>
</body>
</html>
