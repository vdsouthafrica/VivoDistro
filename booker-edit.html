<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Booker Profile | Vivo Distro</title>
    <link rel="stylesheet" href="style.css">
     <link rel="stylesheet" href="responsive.css"> <!-- YOUR NEW RESPONSIVE CSS -->
    <link rel="stylesheet" href="edit.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="global-fullscreen.js" defer></script>
    <style>
        .type-checkboxes {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }
        
        .type-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .type-checkbox:hover {
            border-color: #6C63FF;
            background: rgba(108, 99, 255, 0.05);
        }
        
        .type-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #6C63FF;
            margin: 0;
        }
        
        .type-label {
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        select option {
            background-color: #151a2c !important;
            color: #fff !important;
            padding: 10px !important;
        }
        
        select option:hover {
            background-color: #6C63FF !important;
        }
    </style>
</head>
<body>
    <header class="edit-header">
        <a href="booker-hub.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> <span>Back to Dashboard</span>
        </a>
        <div class="logo">
            <i class="fas fa-calendar-check"></i> <span>EDIT <span class="logo-highlight">PROFILE</span></span>
        </div>
    </header>

    <main class="edit-main">
        <div class="edit-container" style="grid-template-columns: 1fr;">
            <div class="form-column" style="max-width: 800px; margin: 0 auto;">
                <div class="edit-form-container">
                    <h2><i class="fas fa-edit"></i> Edit Your Profile</h2>
                    
                    <form id="editBookerForm">
                        <!-- Basic Info -->
                        <div class="form-section">
                            <h3><span class="section-number">01</span> Basic Information</h3>
                            
                            <div class="form-group">
                                <label class="form-label">Business Logo</label>
                                <div class="image-upload">
                                    <div class="image-preview" id="editLogoPreview">
                                        <i class="fas fa-building"></i>
                                        <div class="upload-overlay">
                                            <i class="fas fa-camera"></i> <span>Change Logo</span>
                                        </div>
                                    </div>
                                    <input type="file" id="editLogo" accept="image/*" hidden>
                                    <p class="upload-note">Square image, max 2MB</p>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Business Name *</label>
                                <input type="text" id="editName" required>
                            </div>
                            
                            <!-- Location with Geolocation -->
                            <div class="form-group">
                                <label class="form-label">Location *</label>
                                <div style="display: flex; gap: 10px; align-items: center;">
                                    <div style="flex: 1; position: relative;">
                                        <i class="fas fa-map-marker-alt" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #6C63FF;"></i>
                                        <input type="text" id="editLocation" placeholder="City, Country" style="width: 100%; padding: 15px 15px 15px 45px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff;" required readonly>
                                        <input type="hidden" id="city">
                                        <input type="hidden" id="country">
                                        <input type="hidden" id="countryCode">
                                    </div>
                                    <button type="button" id="getLocationBtn" style="padding: 15px 25px; background: rgba(108,99,255,0.1); border: 1px solid rgba(108,99,255,0.3); border-radius: 12px; color: #6C63FF; cursor: pointer; white-space: nowrap;">
                                        <i class="fas fa-location-dot"></i> Detect Location
                                    </button>
                                </div>
                                <p class="input-hint" style="color: #8892b0; font-size: 0.85rem; margin-top: 5px;">
                                    Click the button to automatically detect your location
                                </p>
                                <div id="locationError" style="color: #F56565; font-size: 0.9rem; margin-top: 5px; display: none;"></div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Bio</label>
                                <textarea id="editBio" rows="4"></textarea>
                                <p class="char-count"><span id="bioChars">0</span>/500</p>
                            </div>
                        </div>

                       <!-- Business Types -->
                        <div class="form-section">
                            <h3><span class="section-number">02</span> Business Type</h3>
                            <div class="form-group">
                                <p class="form-description">Select all that apply to your business</p>
                                <div class="type-checkboxes">
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Venue Owner">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Venue Owner</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Event Organizer">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Event Organizer</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Festival Manager">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Festival Manager</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Club Manager">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Club Manager</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Restaurant Owner">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Restaurant Owner</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Hotel Events">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Hotel Events</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Corporate Events">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Corporate Events</span>
                                    </label>
                                    <label class="type-checkbox">
                                        <input type="checkbox" name="businessType" value="Wedding Planner">
                                        <span class="checkmark"></span>
                                        <span class="type-label">Wedding Planner</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Social Media -->
                        <div class="form-section">
                            <h3><span class="section-number">03</span> Social Media</h3>
                            <div class="form-group">
                                <p class="form-description">Add your social media profiles</p>
                                <div class="social-inputs" id="socialInputs"></div>
                                <button type="button" class="add-social-btn" id="addSocialBtn">
                                    <i class="fas fa-plus"></i> Add Social Media
                                </button>
                            </div>
                        </div>

                        <!-- Form Actions -->
                        <div class="form-actions">
                            <button type="button" class="btn-cancel" onclick="window.location.href='booker-hub.html'">Cancel</button>
                            <button type="submit" class="btn-save"><i class="fas fa-save"></i> Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const supabaseUrl = 'https://msjinuumxmezrijqemmp.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zamludXVteG1lenJpanFlbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTAyNjMsImV4cCI6MjA4NzY2NjI2M30.ic50fSC7MQfhSkhfE5E8B0R5-BGCQStMRZNHiy6Zakw';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

            let currentProfile = null;
            let logoImageData = null;

            const socialPlatforms = {
                'whatsapp': { name: 'WhatsApp', icon: 'fab fa-whatsapp', color: '#25D366' },
                'email': { name: 'Email', icon: 'fas fa-envelope', color: '#EA4335' },
                'instagram': { name: 'Instagram', icon: 'fab fa-instagram', color: '#E4405F' },
                'facebook': { name: 'Facebook', icon: 'fab fa-facebook', color: '#1877F2' },
                'twitter': { name: 'Twitter', icon: 'fab fa-twitter', color: '#1DA1F2' },
                'tiktok': { name: 'TikTok', icon: 'fab fa-tiktok', color: '#000000' },
                'youtube': { name: 'YouTube', icon: 'fab fa-youtube', color: '#FF0000' },
                'linkedin': { name: 'LinkedIn', icon: 'fab fa-linkedin', color: '#0A66C2' },
                'website': { name: 'Website', icon: 'fas fa-globe', color: '#6C63FF' }
            };

            loadProfile();

            async function loadProfile() {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                const { data: profile, error } = await supabaseClient
                    .from('bookers')
                    .select('*')
                    .eq('auth_id', user.id)
                    .single();

                if (error || !profile) {
                    window.location.href = 'booker-setup.html';
                    return;
                }

                currentProfile = profile;
                
                document.getElementById('editName').value = profile.name || '';
                
                // Set location fields
                if (profile.location) {
                    document.getElementById('editLocation').value = profile.location;
                }
                if (profile.city) {
                    document.getElementById('city').value = profile.city;
                }
                if (profile.country) {
                    document.getElementById('country').value = profile.country;
                }
                if (profile.country_code) {
                    document.getElementById('countryCode').value = profile.country_code;
                }
                
                document.getElementById('editBio').value = profile.bio || '';

                if (profile.types) {
                    document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
                        cb.checked = profile.types.includes(cb.value);
                    });
                }

                if (profile.logo_url) {
                    const preview = document.getElementById('editLogoPreview');
                    preview.innerHTML = `<img src="${profile.logo_url}" style="width:100%; height:100%; object-fit:cover;"><div class="upload-overlay"><i class="fas fa-camera"></i> <span>Change Logo</span></div>`;
                    logoImageData = profile.logo_url;
                }

                if (profile.social_links) {
                    profile.social_links.forEach(link => addSocialInput(link.platform, link.url));
                }

                updateBioCharCount();
            }

            // ========== GEOLOCATION ==========
            const getLocationBtn = document.getElementById('getLocationBtn');
            const locationInput = document.getElementById('editLocation');
            const cityInput = document.getElementById('city');
            const countryInput = document.getElementById('country');
            const countryCodeInput = document.getElementById('countryCode');
            const locationError = document.getElementById('locationError');

            getLocationBtn.addEventListener('click', function() {
                if (!navigator.geolocation) {
                    locationError.textContent = 'Geolocation is not supported by your browser';
                    locationError.style.display = 'block';
                    return;
                }

                this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Detecting...';
                this.disabled = true;
                locationError.style.display = 'none';

                navigator.geolocation.getCurrentPosition(async function(position) {
                    try {
                        const { latitude, longitude } = position.coords;
                        
                        const response = await fetch(
                            `https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&addressdetails=1`
                        );
                        const data = await response.json();
                        
                        const address = data.address;
                        const city = address.city || address.town || address.village || address.county || 'Unknown';
                        const state = address.state || '';
                        const country = address.country || 'Unknown';
                        const countryCode = getCountryCode(address.country_code || '');
                        
                        let displayLocation = city;
                        if (state) displayLocation += `, ${state}`;
                        displayLocation += `, ${country}`;
                        
                        locationInput.value = displayLocation;
                        cityInput.value = city;
                        countryInput.value = country;
                        countryCodeInput.value = countryCode;
                        
                        getLocationBtn.innerHTML = '<i class="fas fa-check"></i> Detected!';
                        setTimeout(() => {
                            getLocationBtn.innerHTML = '<i class="fas fa-location-dot"></i> Detect Location';
                            getLocationBtn.disabled = false;
                        }, 2000);
                        
                    } catch (error) {
                        console.error('Geocoding error:', error);
                        locationError.textContent = 'Could not detect your location. Please try again.';
                        locationError.style.display = 'block';
                        getLocationBtn.innerHTML = '<i class="fas fa-location-dot"></i> Detect Location';
                        getLocationBtn.disabled = false;
                    }
                }, function(error) {
                    let message = 'Location access denied. Please try again.';
                    if (error.code === 1) message = 'Please allow location access to use this feature.';
                    else if (error.code === 2) message = 'Location unavailable. Please try again.';
                    else if (error.code === 3) message = 'Location request timed out. Please try again.';
                    
                    locationError.textContent = message;
                    locationError.style.display = 'block';
                    getLocationBtn.innerHTML = '<i class="fas fa-location-dot"></i> Detect Location';
                    getLocationBtn.disabled = false;
                });
            });

            function getCountryCode(code) {
                const countryCodes = {
                    'za': 'ZA', 'us': 'US', 'gb': 'GB', 'ng': 'NG', 'ke': 'KE',
                    'gh': 'GH', 'ca': 'CA', 'au': 'AU', 'de': 'DE', 'fr': 'FR',
                    'br': 'BR', 'in': 'IN', 'jp': 'JP', 'cn': 'CN', 'mx': 'MX'
                };
                return countryCodes[code?.toLowerCase()] || code?.toUpperCase() || 'XX';
            }

            // Logo upload
            const logoPreview = document.getElementById('editLogoPreview');
            const logoInput = document.getElementById('editLogo');
            
            logoPreview.addEventListener('click', () => logoInput.click());
            
            logoInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    logoPreview.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;"><div class="upload-overlay"><i class="fas fa-camera"></i> <span>Change Logo</span></div>`;
                    logoImageData = e.target.result;
                };
                reader.readAsDataURL(file);
            });

            // Bio counter
            const bioField = document.getElementById('editBio');
            bioField.addEventListener('input', updateBioCharCount);

            function updateBioCharCount() {
                document.getElementById('bioChars').textContent = bioField.value.length;
            }

            // Social inputs
            document.getElementById('addSocialBtn').addEventListener('click', () => addSocialInput());

            function addSocialInput(platform = '', url = '') {
                const container = document.getElementById('socialInputs');
                const row = document.createElement('div');
                row.className = 'social-input-row';
                row.style.cssText = 'display:flex; gap:10px; margin-bottom:10px; align-items:center;';

                const select = document.createElement('select');
                select.style.cssText = 'flex:1; padding:10px; background:rgba(255,255,255,0.05); border:1px solid #2a2f45; border-radius:8px; color:#fff; cursor:pointer;';
                
                let options = '<option value="">Select Platform</option>';
                Object.entries(socialPlatforms).forEach(([key, data]) => {
                    options += `<option value="${key}" ${platform === key ? 'selected' : ''}>${data.name}</option>`;
                });
                select.innerHTML = options;

                const input = document.createElement('input');
                input.type = 'text';
                input.style.cssText = 'flex:2; padding:10px; background:rgba(255,255,255,0.05); border:1px solid #2a2f45; border-radius:8px; color:#fff;';
                input.placeholder = 'URL';
                input.value = url;

                const removeBtn = document.createElement('button');
                removeBtn.type = 'button';
                removeBtn.innerHTML = '<i class="fas fa-times"></i>';
                removeBtn.style.cssText = 'width:40px; height:40px; background:rgba(245,101,101,0.1); border:1px solid rgba(245,101,101,0.3); border-radius:8px; color:#F56565; cursor:pointer;';
                removeBtn.onclick = () => row.remove();

                row.appendChild(select);
                row.appendChild(input);
                row.appendChild(removeBtn);
                container.appendChild(row);
            }

            // Form submission
            document.getElementById('editBookerForm').addEventListener('submit', async function(e) {
                e.preventDefault();

                const name = document.getElementById('editName').value.trim();
                const location = document.getElementById('editLocation').value.trim();

                if (!name || !location) {
                    showToast('Name and location are required', 'error');
                    return;
                }

                const types = [];
                document.querySelectorAll('input[type="checkbox"]:checked').forEach(cb => {
                    types.push(cb.value);
                });

                const socialLinks = [];
                document.querySelectorAll('.social-input-row').forEach(row => {
                    const select = row.querySelector('select');
                    const input = row.querySelector('input');
                    if (select?.value && input?.value) {
                        socialLinks.push({ platform: select.value, url: input.value });
                    }
                });

                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) return;

                const submitBtn = e.target.querySelector('button[type="submit"]');
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                submitBtn.disabled = true;

                const { error } = await supabaseClient
                    .from('bookers')
                    .update({
                        name,
                        location,
                        city: document.getElementById('city').value || '',
                        country: document.getElementById('country').value || '',
                        country_code: document.getElementById('countryCode').value || '',
                        types,
                        bio: bioField.value,
                        logo_url: logoImageData,
                        social_links: socialLinks,
                        updated_at: new Date().toISOString()
                    })
                    .eq('auth_id', user.id);

                if (error) {
                    showToast('Error: ' + error.message, 'error');
                    submitBtn.innerHTML = 'Save Changes';
                    submitBtn.disabled = false;
                } else {
                    showToast('Profile updated!', 'success');
                    setTimeout(() => window.location.href = 'booker-hub.html', 1500);
                }
            });

            function showToast(message, type) {
                const toast = document.createElement('div');
                toast.textContent = message;
                toast.style.cssText = `
                    position: fixed; top: 20px; right: 20px; padding: 15px 25px;
                    background: ${type === 'success' ? '#48BB78' : '#F56565'};
                    color: white; border-radius: 10px; z-index: 10000;
                    animation: slideInRight 0.3s ease;
                `;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        });
    </script>
</body>
</html>
