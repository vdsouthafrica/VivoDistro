<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Agent Dashboard | Vivo Distro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="hub.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@6.6.6/css/flag-icons.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="global-fullscreen.js" defer></script>
    <style>
        /* Dropdown styles - keeping original theme */
        .nav-item.dropdown-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .dropdown-toggle .chevron {
            transition: transform 0.3s;
            font-size: 0.8rem;
        }
        
        .dropdown-toggle.open .chevron {
            transform: rotate(180deg);
        }
        
        .dropdown-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding-left: 1.5rem;
        }
        
        .dropdown-menu.show {
            max-height: 300px;
        }
        
        .dropdown-menu .nav-item {
            padding-left: 2.5rem !important;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="hub-sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-user-tie"></i>
                <span>VIVO <span class="logo-highlight">DISTRO</span></span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">
                <i class="fas fa-home"></i> <span>Dashboard</span>
            </a>
            
            <!-- Browse -->
            <a href="browse.html" class="nav-item">
                <i class="fas fa-search"></i> <span>Browse</span>
            </a>
            
            <!-- Edit Profile -->
            <a href="agent-edit.html" class="nav-item">
                <i class="fas fa-edit"></i> <span>Edit Profile</span>
            </a>
            
            <!-- Bookings -->
            <a href="bookings.html" class="nav-item">
                <i class="fas fa-calendar-check"></i> <span>Bookings</span>
            </a>
            
            <!-- TOOLS DROPDOWN -->
            <div class="dropdown-container">
                <a href="#" class="nav-item dropdown-toggle" id="toolsDropdownToggle">
                    <span style="display: flex; align-items: center; gap: 0.5rem;">
                        <i class="fas fa-tools"></i> <span>Tools</span>
                    </span>
                    <i class="fas fa-chevron-down chevron"></i>
                </a>
                <div class="dropdown-menu" id="toolsDropdownMenu">
                    <!-- Link to main calculator.html (with new design) -->
                    <a href="calculator.html" class="nav-item dropdown-item">
                        <i class="fas fa-calculator"></i> <span>Vivo Calculator</span>
                    </a>
                    <!-- Link to main calendar.html (with new design) -->
                    <a href="calendar.html" class="nav-item dropdown-item">
                        <i class="fas fa-calendar-alt"></i> <span>Vivo Calendar</span>
                    </a>
                    <a href="agent-artists.html" class="nav-item dropdown-item">
                        <i class="fas fa-users"></i> <span>My Artists</span>
                    </a>
                    <a href="techlist.html" class="nav-item dropdown-item">
                        <i class="fas fa-microchip"></i> <span>TechList</span>
                    </a>
                    <a href="checklist.html" class="nav-item dropdown-item">
                        <i class="fas fa-check-square"></i> <span>CheckList</span>
                    </a>
                </div>
            </div>
            
            
                <!-- Navbar Placement Panel -->
                <div class="settings-panel" id="placementPanel" style="display: none; background: rgba(255,255,255,0.1); border-radius: 8px; margin: 0.5rem 0 0.5rem 2rem; padding: 1rem;">
                    <h4 style="margin-top:0; color: white;">Navbar Position</h4>
                    <div class="placement-buttons" style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem;">
                        <button class="placement-btn" data-placement="left" style="padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 20px; background: transparent; color: white; cursor: pointer;">Left</button>
                        <button class="placement-btn" data-placement="top" style="padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 20px; background: transparent; color: white; cursor: pointer;">Top</button>
                        <button class="placement-btn" data-placement="bottom" style="padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 20px; background: transparent; color: white; cursor: pointer;">Bottom</button>
                        <button class="placement-btn" data-placement="right" style="padding: 0.5rem 1rem; border: 1px solid #ccc; border-radius: 20px; background: transparent; color: white; cursor: pointer;">Right</button>
                    </div>
                </div>
            </div>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">
                    <i class="fas fa-user-tie"></i>
                </div>
                <div class="user-info">
                    <h4 id="userName">Agency Name</h4>
                    <p id="userRole">Agent</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content - Header buttons removed -->
    <main class="hub-main">
        <header class="hub-header">
            <!-- Header actions removed as requested -->
        </header>

        <div class="dashboard-content">
            <!-- Agency Profile Card with Flag -->
            <div class="profile-card">
                <div class="profile-header">
                    <h2><i class="fas fa-user-tie"></i> Agency Profile</h2>
                </div>
                
                <!-- Country Flag Badge -->
                <div class="country-flag-badge" id="countryFlagBadge" style="display: none;">
                    <span class="fi" id="countryFlag"></span>
                    <span class="country-name" id="countryName"></span>
                </div>
                
                <div class="profile-content">
                    <div class="profile-avatar-large" id="profileAvatar">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    
                    <div class="profile-details">
                        <h3 id="profileName">Agency Name</h3>
                        <p class="profile-location" id="profileLocation">
                            <i class="fas fa-map-marker-alt"></i> Location
                        </p>
                        
                        <div class="profile-bio" id="profileBio"></div>
                        
                        <div class="profile-specialties" id="profileSpecialties"></div>
                        
                        <div class="profile-social" id="profileSocial"></div>
                        
                        <div class="profile-stats">
                            <div class="stat">
                                <div class="stat-number" id="artistsCount">0</div>
                                <div class="stat-label">ARTISTS</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="push-service.js"></script>
    <script src="chat-notifications.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const supabaseUrl = 'https://msjinuumxmezrijqemmp.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zamludXVteG1lenJpanFlbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTAyNjMsImV4cCI6MjA4NzY2NjI2M30.ic50fSC7MQfhSkhfE5E8B0R5-BGCQStMRZNHiy6Zakw';
            const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

            // Initialize push notifications
            if (window.PushService) {
                PushService.init(supabaseClient);
            }
            
            // Initialize chat notifications
            if (window.ChatNotifications) {
                ChatNotifications.init(supabaseClient);
                
                // Register callback for badge updates
                ChatNotifications.onUpdate((count) => {
                    const badge = document.getElementById('chatNotificationBadge');
                    if (badge) {
                        if (count > 0) {
                            badge.textContent = count;
                            badge.style.display = 'inline-block';
                        } else {
                            badge.style.display = 'none';
                        }
                    }
                });
            }

            await loadProfile();

            async function loadProfile() {
                const { data: { user } } = await supabaseClient.auth.getUser();
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }

                const { data: profile, error } = await supabaseClient
                    .from('agents')
                    .select('*')
                    .eq('auth_id', user.id)
                    .single();

                if (error) {
                    if (error.code === 'PGRST116') {
                        window.location.href = 'agent-setup.html';
                    }
                    return;
                }

                if (profile) updateDashboard(profile);
            }

            function updateDashboard(profile) {
                // Update country flag
                updateCountryFlag(profile.country_code, profile.country);
                
                // Update avatar
                const avatars = document.querySelectorAll('#userAvatar, #profileAvatar');
                avatars.forEach(el => {
                    if (profile.logo_url) {
                        el.innerHTML = `<img src="${profile.logo_url}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                });

                // Update name
                document.getElementById('userName').textContent = profile.name || 'Agency Name';
                document.getElementById('profileName').textContent = profile.name || 'Agency Name';
                
                // Update location
                document.getElementById('profileLocation').innerHTML = 
                    `<i class="fas fa-map-marker-alt"></i> ${profile.location || 'Location not set'}`;

                // Update bio
                const bioEl = document.getElementById('profileBio');
                if (profile.bio) {
                    bioEl.innerHTML = `<p>${profile.bio}</p>`;
                }

                // Update specialties
                const specsEl = document.getElementById('profileSpecialties');
                if (profile.specialties?.length > 0) {
                    specsEl.innerHTML = profile.specialties.map(s => 
                        `<span class="type-badge">${s}</span>`
                    ).join('');
                }

                // Update social links
                const socialEl = document.getElementById('profileSocial');
                if (profile.social_links?.length > 0) {
                    socialEl.innerHTML = profile.social_links.map(link => {
                        const icons = {
                            'instagram': 'fab fa-instagram',
                            'facebook': 'fab fa-facebook',
                            'twitter': 'fab fa-twitter',
                            'tiktok': 'fab fa-tiktok',
                            'youtube': 'fab fa-youtube',
                            'linkedin': 'fab fa-linkedin',
                            'website': 'fas fa-globe'
                        };
                        return `<a href="${link.url}" target="_blank" class="social-icon">
                            <i class="${icons[link.platform] || 'fas fa-link'}"></i>
                        </a>`;
                    }).join('');
                }

                // Update stats
                document.getElementById('artistsCount').textContent = profile.stats?.artists || '0';
            }

            function updateCountryFlag(countryCode, countryName) {
                const flagBadge = document.getElementById('countryFlagBadge');
                const flagElement = document.getElementById('countryFlag');
                const nameElement = document.getElementById('countryName');
                
                if (countryCode) {
                    const code = countryCode.toLowerCase();
                    flagElement.className = `fi fi-${code} fi-circle`;
                    nameElement.textContent = countryName || '';
                    flagBadge.style.display = 'flex';
                } else {
                    flagBadge.style.display = 'none';
                }
            }

            // ========== DROPDOWN TOGGLES ==========
            const toolsToggle = document.getElementById('toolsDropdownToggle');
            const toolsMenu = document.getElementById('toolsDropdownMenu');
            
            if (toolsToggle && toolsMenu) {
                toolsToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    toolsToggle.classList.toggle('open');
                    toolsMenu.classList.toggle('show');
                });
            }

            const settingsToggle = document.getElementById('settingsDropdownToggle');
            const settingsMenu = document.getElementById('settingsDropdownMenu');
            const themesPanel = document.getElementById('themesPanel');
            const placementPanel = document.getElementById('placementPanel');
            const themesToggle = document.getElementById('themesToggle');
            const placementToggle = document.getElementById('placementToggle');

            if (settingsToggle && settingsMenu) {
                settingsToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    settingsToggle.classList.toggle('open');
                    settingsMenu.classList.toggle('show');
                    
                    // Hide panels when closing the dropdown
                    if (!settingsMenu.classList.contains('show')) {
                        if (themesPanel) themesPanel.style.display = 'none';
                        if (placementPanel) placementPanel.style.display = 'none';
                    }
                });
            }

            // Toggle themes panel
            if (themesToggle) {
                themesToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (themesPanel) {
                        const isVisible = themesPanel.style.display === 'block';
                        themesPanel.style.display = isVisible ? 'none' : 'block';
                        if (placementPanel) placementPanel.style.display = 'none';
                    }
                });
            }

            // Toggle placement panel
            if (placementToggle) {
                placementToggle.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (placementPanel) {
                        const isVisible = placementPanel.style.display === 'block';
                        placementPanel.style.display = isVisible ? 'none' : 'block';
                        if (themesPanel) themesPanel.style.display = 'none';
                    }
                });
            }

            // Theme selection
            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const theme = this.dataset.theme;
                    applyTheme(theme);
                    localStorage.setItem('vivoTheme', theme);
                });
            });

            // Slideshow toggle
            const slideshowCheck = document.getElementById('slideshowToggle');
            if (slideshowCheck) {
                slideshowCheck.addEventListener('change', function() {
                    if (this.checked) {
                        startSlideshow();
                    } else {
                        stopSlideshow();
                    }
                    localStorage.setItem('vivoSlideshow', this.checked);
                });
            }

            // Navbar placement
            document.querySelectorAll('.placement-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const placement = this.dataset.placement;
                    applyPlacement(placement);
                    localStorage.setItem('vivoPlacement', placement);
                });
            });

            // Load saved settings
            const savedTheme = localStorage.getItem('vivoTheme');
            if (savedTheme) applyTheme(savedTheme);
            
            const savedSlideshow = localStorage.getItem('vivoSlideshow') === 'true';
            if (savedSlideshow && slideshowCheck) {
                slideshowCheck.checked = true;
                startSlideshow();
            }
            
            const savedPlacement = localStorage.getItem('vivoPlacement');
            if (savedPlacement) applyPlacement(savedPlacement);

            // Theme application (simple CSS variables)
            function applyTheme(theme) {
                const root = document.documentElement;
                switch(theme) {
                    case 'dark':
                        root.style.setProperty('--bg-color', '#1a1a1a');
                        root.style.setProperty('--text-color', '#f0f0f0');
                        break;
                    case 'ocean':
                        root.style.setProperty('--bg-color', '#1e3c72');
                        root.style.setProperty('--text-color', '#e0f2fe');
                        break;
                    case 'forest':
                        root.style.setProperty('--bg-color', '#2d5a27');
                        root.style.setProperty('--text-color', '#e0f2e0');
                        break;
                    case 'sunset':
                        root.style.setProperty('--bg-color', '#b43b3b');
                        root.style.setProperty('--text-color', '#fff3e0');
                        break;
                    default:
                        root.style.setProperty('--bg-color', '');
                        root.style.setProperty('--text-color', '');
                }
            }

            let slideshowInterval;
            let currentImage = 1;
            
            function startSlideshow() {
                if (slideshowInterval) clearInterval(slideshowInterval);
                document.body.classList.add('slideshow-bg');
                slideshowInterval = setInterval(() => {
                    document.body.style.backgroundImage = `url('${currentImage}.jpg')`;
                    currentImage = (currentImage % 4) + 1;
                }, 5000);
            }
            
            function stopSlideshow() {
                if (slideshowInterval) clearInterval(slideshowInterval);
                document.body.classList.remove('slideshow-bg');
                document.body.style.backgroundImage = '';
            }

            function applyPlacement(placement) {
                document.body.classList.remove('nav-left', 'nav-right', 'nav-top', 'nav-bottom');
                document.body.classList.add(`nav-${placement}`);
            }
        });
    </script>
</body>
</html>
