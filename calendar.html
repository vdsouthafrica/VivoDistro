<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vivo Calendar | Professional Event Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0c12;
            --bg-secondary: #12141c;
            --bg-card: #1a1d28;
            --bg-hover: #252a38;
            --border-light: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #9aa4bf;
            --text-muted: #5f6b8a;
            --accent: #4361ee;
            --accent-light: rgba(67, 97, 238, 0.1);
            --accent-gradient: linear-gradient(135deg, #4361ee 0%, #8056f5 100%);
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Main Layout */
        .calendar-layout {
            display: flex;
            min-height: 100vh;
        }

        /* ========== SIDEBAR ========== */
        .calendar-sidebar {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-medium);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 2rem;
        }

        .logo i {
            color: var(--accent);
            font-size: 1.8rem;
        }

        .logo span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Add Event Button */
        .add-event-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
        }

        .add-event-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(67, 97, 238, 0.4);
        }

        /* Upcoming Events - REDUCED HEIGHT */
        .upcoming-section {
            flex: 1;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .section-title i {
            color: var(--accent);
        }

        .upcoming-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .event-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 0.8rem 1rem; /* Reduced padding */
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .event-card:hover {
            transform: translateX(4px);
            border-color: var(--accent);
            background: var(--bg-hover);
        }

        .event-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--event-color, var(--accent));
        }

        .event-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.2rem; /* Reduced margin */
        }

        .event-date-badge {
            font-size: 0.75rem; /* Smaller font */
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .event-date-badge i {
            color: var(--event-color, var(--accent));
            font-size: 0.7rem;
        }

        .event-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.2rem;
            font-size: 0.9rem; /* Smaller font */
        }

        .event-venue {
            font-size: 0.75rem; /* Smaller font */
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .event-time {
            font-size: 0.7rem;
            color: var(--event-color, var(--accent));
            background: rgba(var(--event-color-rgb), 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
        }

        .empty-events {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px dashed var(--border-medium);
        }

        .empty-events i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.5;
        }

        /* ========== MAIN CALENDAR ========== */
        .calendar-main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Header with Month selector and Back button */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .month-selector {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--bg-card);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 1px solid var(--border-light);
        }

        .month-selector h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            min-width: 180px;
            text-align: center;
        }

        .nav-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Stats in header - smaller */
        .header-stats {
            display: flex;
            gap: 1rem;
        }

        .stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 0.4rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-pill .stat-value {
            font-size: 1rem;
            font-weight: 600;
            color: var(--accent);
        }

        .stat-pill .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Back button in header */
        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 0.6rem 1.2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: var(--accent-light);
        }

        /* Calendar Grid */
        .calendar-grid {
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border-light);
        }

        .weekday {
            padding: 1rem;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            min-height: 600px;
        }

        .calendar-day {
            border-right: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
            padding: 0.8rem;
            min-height: 120px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        .calendar-day:nth-child(7n) {
            border-right: none;
        }

        .calendar-day.other-month {
            background: rgba(0, 0, 0, 0.2);
            color: var(--text-muted);
        }

        .calendar-day.today {
            background: rgba(67, 97, 238, 0.05);
        }

        .day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .day-number {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .today .day-number {
            background: var(--accent);
            color: white;
        }

        .event-indicator {
            display: flex;
            gap: 3px;
        }

        .event-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--event-color, var(--accent));
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .mini-event {
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            background: var(--event-light, rgba(67, 97, 238, 0.1));
            border-left: 2px solid var(--event-color, var(--accent));
            border-radius: 3px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.2s;
        }

        .mini-event:hover {
            background: var(--event-light, rgba(67, 97, 238, 0.2));
            transform: translateX(2px);
        }

        .more-events {
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 0.2rem;
            padding: 0.1rem 0.3rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            display: inline-block;
        }

        /* Modal (unchanged) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .event-modal {
            width: 550px;
            max-width: 95%;
            max-height: 90vh;
            background: var(--bg-card);
            border-radius: 24px;
            border: 1px solid var(--border-medium);
            overflow: hidden;
            animation: modalSlideUp 0.3s ease;
        }

        @keyframes modalSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            background: linear-gradient(to right, rgba(67, 97, 238, 0.1), transparent);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .close-modal {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-modal:hover {
            border-color: var(--danger);
            color: var(--danger);
            background: rgba(239, 68, 68, 0.1);
        }

        .modal-body {
            padding: 2rem;
            max-height: calc(90vh - 130px);
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.4);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .color-option {
            position: relative;
            cursor: pointer;
        }

        .color-option input {
            position: absolute;
            opacity: 0;
        }

        .color-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .color-option input:checked + .color-swatch {
            transform: scale(1.05);
            border-color: white;
            box-shadow: 0 0 0 2px var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            flex: 1;
            padding: 0.9rem;
            background: var(--accent-gradient);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(67, 97, 238, 0.3);
        }

        .btn-secondary {
            padding: 0.9rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-danger {
            padding: 0.9rem 1.5rem;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 10px;
            color: var(--danger);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.15);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 3000;
            animation: slideInRight 0.3s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }
        .notification.info { background: var(--accent); }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 1200px) {
            .calendar-layout {
                flex-direction: column;
            }
            
            .calendar-sidebar {
                width: 100%;
                height: auto;
                position: static;
                border-right: none;
                border-bottom: 1px solid var(--border-medium);
            }
            
            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="calendar-layout">
        <!-- Sidebar - Only Upcoming Events -->
        <aside class="calendar-sidebar">
            <div class="logo">
                <i class="fas fa-calendar-alt"></i>
                <span>VIVO CALENDAR</span>
            </div>

            <!-- Add Event Button -->
            <button class="add-event-btn" id="addEventBtn">
                <i class="fas fa-plus"></i>
                Add New Event
            </button>

            <!-- Upcoming Events - COMPACT VERSION -->
            <div class="upcoming-section">
                <div class="section-title">
                    <i class="fas fa-clock"></i>
                    <span>Upcoming Events</span>
                </div>
                <div class="upcoming-list" id="upcomingEventsList">
                    <div class="empty-events">
                        <i class="fas fa-calendar-plus"></i>
                        <p>No upcoming events</p>
                        <small>Click "Add New Event" to get started</small>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Calendar -->
        <main class="calendar-main">
            <div class="calendar-header">
                <div class="header-left">
                    <!-- Month Selector -->
                    <div class="month-selector">
                        <button class="nav-btn prev-month">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <h2 id="currentMonth">March 2026</h2>
                        <button class="nav-btn next-month">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>

                    <!-- Compact Stats -->
                    <div class="header-stats">
                        <div class="stat-pill">
                            <span class="stat-value" id="totalGigs">0</span>
                            <span class="stat-label">Total</span>
                        </div>
                        <div class="stat-pill">
                            <span class="stat-value" id="upcomingGigs">0</span>
                            <span class="stat-label">Upcoming</span>
                        </div>
                    </div>
                </div>

                <!-- Back Button in Header -->
                <a href="javascript:history.back()" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    Back to Dashboard
                </a>
            </div>

            <!-- Calendar Grid -->
            <div class="calendar-grid">
                <div class="weekdays">
                    <div class="weekday">Sun</div>
                    <div class="weekday">Mon</div>
                    <div class="weekday">Tue</div>
                    <div class="weekday">Wed</div>
                    <div class="weekday">Thu</div>
                    <div class="weekday">Fri</div>
                    <div class="weekday">Sat</div>
                </div>
                <div class="days-grid" id="calendarDays"></div>
            </div>
        </main>
    </div>

    <!-- Event Modal -->
    <div class="modal-overlay" id="eventModal">
        <div class="event-modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add New Event</h3>
                <button class="close-modal" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="eventForm">
                    <div class="form-group">
                        <label>Event Title *</label>
                        <input type="text" id="eventTitle" placeholder="e.g. Summer Music Festival" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="eventDate" required>
                        </div>
                        <div class="form-group">
                            <label>Time *</label>
                            <input type="time" id="eventTime" value="20:00" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Venue / Location *</label>
                        <input type="text" id="eventVenue" placeholder="e.g. The Grand Arena, Cape Town" required>
                    </div>

                    <div class="form-group">
                        <label>Event Color</label>
                        <div class="color-grid" id="colorGrid">
                            <label class="color-option">
                                <input type="radio" name="color" value="#4361ee" checked>
                                <span class="color-swatch" style="background: #4361ee;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#8b5cf6">
                                <span class="color-swatch" style="background: #8b5cf6;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#ec4899">
                                <span class="color-swatch" style="background: #ec4899;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#ef4444">
                                <span class="color-swatch" style="background: #ef4444;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#f97316">
                                <span class="color-swatch" style="background: #f97316;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#10b981">
                                <span class="color-swatch" style="background: #10b981;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#3b82f6">
                                <span class="color-swatch" style="background: #3b82f6;"></span>
                            </label>
                            <label class="color-option">
                                <input type="radio" name="color" value="#6b7280">
                                <span class="color-swatch" style="background: #6b7280;"></span>
                            </label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Additional Notes</label>
                        <textarea id="eventNotes" rows="3" placeholder="Setlist, equipment needs, contact person, etc."></textarea>
                    </div>

                    <div class="modal-actions">
                        <button type="button" class="btn-danger" id="deleteEvent" style="display: none;">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                        <button type="button" class="btn-secondary" id="cancelEvent">Cancel</button>
                        <button type="submit" class="btn-primary">Save Event</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ========== EVENT REMINDER SYSTEM ==========
        const EventReminder = {
            checkUpcomingEvents: async function() {
                try {
                    const events = JSON.parse(localStorage.getItem('vivoCalendarEvents') || '[]');
                    
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(0, 0, 0, 0);
                    
                    const tomorrowStr = tomorrow.toISOString().split('T')[0];
                    
                    const eventsTomorrow = events.filter(event => {
                        const eventDate = new Date(event.date);
                        const eventDateStr = eventDate.toISOString().split('T')[0];
                        const reminderKey = `event_reminder_${event.id}`;
                        const reminderSent = localStorage.getItem(reminderKey);
                        
                        return eventDateStr === tomorrowStr && !reminderSent;
                    });
                    
                    for (const event of eventsTomorrow) {
                        console.log('📅 Sending reminder for:', event.title);
                        showNotification(`Reminder: ${event.title} tomorrow at ${event.venue}`, 'info');
                        localStorage.setItem(`event_reminder_${event.id}`, 'sent');
                    }
                } catch (error) {
                    console.error('Error checking upcoming events:', error);
                }
            },
            
            init: function() {
                this.checkUpcomingEvents();
                setInterval(() => this.checkUpcomingEvents(), 60 * 60 * 1000);
            }
        };

        // ========== MAIN CALENDAR CODE ==========
        document.addEventListener('DOMContentLoaded', function() {
            // DOM Elements
            const calendarDays = document.getElementById('calendarDays');
            const currentMonthEl = document.getElementById('currentMonth');
            const prevMonthBtn = document.querySelector('.prev-month');
            const nextMonthBtn = document.querySelector('.next-month');
            const addEventBtn = document.getElementById('addEventBtn');
            const eventModal = document.getElementById('eventModal');
            const closeModal = document.getElementById('closeModal');
            const cancelEvent = document.getElementById('cancelEvent');
            const eventForm = document.getElementById('eventForm');
            const upcomingEventsList = document.getElementById('upcomingEventsList');
            const deleteEventBtn = document.getElementById('deleteEvent');
            
            // Calendar State
            let currentDate = new Date();
            let events = [];
            let editingEventId = null;
            
            // Load events and render
            loadEvents();
            renderCalendar();
            updateUpcomingEvents();
            updateStats();
            
            // Initialize reminder system
            EventReminder.init();
            
            // Month Navigation
            prevMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() - 1);
                renderCalendar();
            });
            
            nextMonthBtn.addEventListener('click', () => {
                currentDate.setMonth(currentDate.getMonth() + 1);
                renderCalendar();
            });
            
            // Add Event Button
            addEventBtn.addEventListener('click', () => {
                editingEventId = null;
                openEventModal();
            });
            
            // Modal Controls
            closeModal.addEventListener('click', closeEventModal);
            cancelEvent.addEventListener('click', closeEventModal);
            
            // Form Submission
            eventForm.addEventListener('submit', function(e) {
                e.preventDefault();
                saveEvent();
            });
            
            // Delete Event
            deleteEventBtn.addEventListener('click', deleteCurrentEvent);
            
            // Load events from localStorage
            function loadEvents() {
                const savedEvents = localStorage.getItem('vivoCalendarEvents');
                if (savedEvents) {
                    try {
                        events = JSON.parse(savedEvents);
                        
                        // Convert date strings back to Date objects
                        events.forEach(event => {
                            if (event.date) {
                                event.date = new Date(event.date);
                            }
                            if (event.createdAt) event.createdAt = new Date(event.createdAt);
                            if (event.updatedAt) event.updatedAt = new Date(event.updatedAt);
                        });
                    } catch (e) {
                        console.error('Error loading events:', e);
                        events = [];
                    }
                }
            }
            
            // Save events to localStorage
            function saveEvents() {
                localStorage.setItem('vivoCalendarEvents', JSON.stringify(events));
                updateUpcomingEvents();
                updateStats();
                renderCalendar();
            }
            
            // Generate unique ID
            function generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            }
            
            // Render Calendar - FIXED to show correct days
            function renderCalendar() {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const today = new Date();
                
                // Update month header
                const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                                  'July', 'August', 'September', 'October', 'November', 'December'];
                currentMonthEl.textContent = `${monthNames[month]} ${year}`;
                
                // Clear calendar
                calendarDays.innerHTML = '';
                
                // Get first day of month (0 = Sunday, 1 = Monday, etc.)
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                const daysInMonth = lastDay.getDate();
                const firstDayIndex = firstDay.getDay(); // 0 = Sunday
                
                // Calculate days from previous month to show
                const prevMonthDays = firstDayIndex;
                
                // Get previous month's last days
                const prevMonth = new Date(year, month, 0);
                const daysInPrevMonth = prevMonth.getDate();
                
                // Add days from previous month
                for (let i = prevMonthDays - 1; i >= 0; i--) {
                    const day = daysInPrevMonth - i;
                    const date = new Date(year, month - 1, day);
                    addCalendarDay(date, true, today);
                }
                
                // Add days from current month
                for (let i = 1; i <= daysInMonth; i++) {
                    const date = new Date(year, month, i);
                    const isToday = date.getDate() === today.getDate() && 
                                   date.getMonth() === today.getMonth() && 
                                   date.getFullYear() === today.getFullYear();
                    addCalendarDay(date, false, today, isToday);
                }
                
                // Calculate total cells used so far
                const totalCells = 42; // 6 rows × 7 days
                const usedCells = prevMonthDays + daysInMonth;
                const remainingCells = totalCells - usedCells;
                
                // Add days from next month
                for (let i = 1; i <= remainingCells; i++) {
                    const date = new Date(year, month + 1, i);
                    addCalendarDay(date, true, today);
                }
            }
            
            // Add a day to the calendar
            function addCalendarDay(date, isOtherMonth, today, isToday = false) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                
                if (isOtherMonth) dayElement.classList.add('other-month');
                if (isToday) dayElement.classList.add('today');
                
                // Day header
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                
                const dayNumber = document.createElement('span');
                dayNumber.className = 'day-number';
                dayNumber.textContent = date.getDate();
                dayHeader.appendChild(dayNumber);
                
                // Get events for this day
                const dayEvents = getEventsForDate(date);
                
                // Event indicators
                if (dayEvents.length > 0) {
                    const eventIndicator = document.createElement('div');
                    eventIndicator.className = 'event-indicator';
                    
                    dayEvents.slice(0, 3).forEach(event => {
                        const dot = document.createElement('span');
                        dot.className = 'event-dot';
                        dot.style.setProperty('--event-color', event.color || '#4361ee');
                        eventIndicator.appendChild(dot);
                    });
                    
                    dayHeader.appendChild(eventIndicator);
                }
                
                dayElement.appendChild(dayHeader);
                
                // Day events (show up to 2)
                const eventsContainer = document.createElement('div');
                eventsContainer.className = 'day-events';
                
                dayEvents.slice(0, 2).forEach(event => {
                    const eventEl = document.createElement('div');
                    eventEl.className = 'mini-event';
                    eventEl.style.setProperty('--event-color', event.color || '#4361ee');
                    eventEl.style.setProperty('--event-light', `${event.color}20` || '#4361ee20');
                    eventEl.textContent = event.title;
                    eventEl.title = `${event.title} - ${event.time} @ ${event.venue}`;
                    eventEl.addEventListener('click', (e) => {
                        e.stopPropagation();
                        editEvent(event.id);
                    });
                    eventsContainer.appendChild(eventEl);
                });
                
                dayElement.appendChild(eventsContainer);
                
                // Show event count if more than 2
                if (dayEvents.length > 2) {
                    const moreEvents = document.createElement('span');
                    moreEvents.className = 'more-events';
                    moreEvents.textContent = `+${dayEvents.length - 2} more`;
                    dayElement.appendChild(moreEvents);
                }
                
                // Click to add event on this day
                dayElement.addEventListener('click', () => {
                    editingEventId = null;
                    openEventModal(date);
                });
                
                calendarDays.appendChild(dayElement);
            }
            
            // Get events for specific date
            function getEventsForDate(date) {
                return events.filter(event => {
                    const eventDate = new Date(event.date);
                    return eventDate.getFullYear() === date.getFullYear() &&
                           eventDate.getMonth() === date.getMonth() &&
                           eventDate.getDate() === date.getDate();
                }).sort((a, b) => a.time.localeCompare(b.time));
            }
            
            // Open event modal
            function openEventModal(date = null) {
                const modalTitle = document.getElementById('modalTitle');
                const deleteBtn = document.getElementById('deleteEvent');
                
                if (editingEventId) {
                    modalTitle.textContent = 'Edit Event';
                    deleteBtn.style.display = 'block';
                    
                    const event = events.find(e => e.id === editingEventId);
                    if (event) {
                        document.getElementById('eventTitle').value = event.title;
                        
                        const eventDate = new Date(event.date);
                        const year = eventDate.getFullYear();
                        const month = String(eventDate.getMonth() + 1).padStart(2, '0');
                        const day = String(eventDate.getDate()).padStart(2, '0');
                        document.getElementById('eventDate').value = `${year}-${month}-${day}`;
                        
                        document.getElementById('eventTime').value = event.time;
                        document.getElementById('eventVenue').value = event.venue;
                        document.getElementById('eventNotes').value = event.notes || '';
                        
                        const colorInput = document.querySelector(`input[name="color"][value="${event.color || '#4361ee'}"]`);
                        if (colorInput) colorInput.checked = true;
                    }
                } else {
                    modalTitle.textContent = 'Add New Event';
                    deleteBtn.style.display = 'none';
                    eventForm.reset();
                    document.querySelector('input[name="color"][value="#4361ee"]').checked = true;
                    
                    if (date) {
                        const year = date.getFullYear();
                        const month = String(date.getMonth() + 1).padStart(2, '0');
                        const day = String(date.getDate()).padStart(2, '0');
                        document.getElementById('eventDate').value = `${year}-${month}-${day}`;
                    } else {
                        const today = new Date();
                        const year = today.getFullYear();
                        const month = String(today.getMonth() + 1).padStart(2, '0');
                        const day = String(today.getDate()).padStart(2, '0');
                        document.getElementById('eventDate').value = `${year}-${month}-${day}`;
                    }
                }
                
                eventModal.classList.add('active');
            }
            
            // Close event modal
            function closeEventModal() {
                eventModal.classList.remove('active');
                editingEventId = null;
            }
            
            // Save event
            function saveEvent() {
                const title = document.getElementById('eventTitle').value.trim();
                const dateInput = document.getElementById('eventDate').value;
                const time = document.getElementById('eventTime').value;
                const venue = document.getElementById('eventVenue').value.trim();
                const notes = document.getElementById('eventNotes').value.trim();
                const colorInput = document.querySelector('input[name="color"]:checked');
                const color = colorInput ? colorInput.value : '#4361ee';
                
                if (!title || !dateInput || !venue) {
                    showNotification('Please fill in all required fields', 'error');
                    return;
                }
                
                const [year, month, day] = dateInput.split('-').map(Number);
                const date = new Date(year, month - 1, day, 12, 0, 0);
                
                if (editingEventId) {
                    const eventIndex = events.findIndex(e => e.id === editingEventId);
                    if (eventIndex > -1) {
                        events[eventIndex] = {
                            ...events[eventIndex],
                            title,
                            date,
                            time,
                            venue,
                            notes,
                            color,
                            updatedAt: new Date()
                        };
                        showNotification('Event updated successfully!', 'success');
                    }
                } else {
                    const newEvent = {
                        id: generateId(),
                        title,
                        date,
                        time,
                        venue,
                        notes,
                        color,
                        createdAt: new Date()
                    };
                    events.push(newEvent);
                    showNotification('Event added successfully!', 'success');
                }
                
                saveEvents();
                closeEventModal();
            }
            
            // Edit event
            function editEvent(eventId) {
                editingEventId = eventId;
                openEventModal();
            }
            
            // Delete event
            function deleteCurrentEvent() {
                if (confirm('Are you sure you want to delete this event?')) {
                    events = events.filter(e => e.id !== editingEventId);
                    saveEvents();
                    closeEventModal();
                    showNotification('Event deleted', 'info');
                }
            }
            
            // Update upcoming events list - COMPACT VERSION
            function updateUpcomingEvents() {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                
                const upcoming = events
                    .filter(event => {
                        const eventDate = new Date(event.date);
                        eventDate.setHours(0, 0, 0, 0);
                        return eventDate >= now;
                    })
                    .sort((a, b) => new Date(a.date) - new Date(b.date))
                    .slice(0, 5);
                
                if (upcoming.length > 0) {
                    upcomingEventsList.innerHTML = '';
                    upcoming.forEach(event => {
                        const eventCard = document.createElement('div');
                        eventCard.className = 'event-card';
                        eventCard.style.setProperty('--event-color', event.color || '#4361ee');
                        eventCard.addEventListener('click', () => editEvent(event.id));
                        
                        const eventDate = new Date(event.date);
                        const dateStr = formatEventDate(eventDate);
                        
                        eventCard.innerHTML = `
                            <div class="event-card-header">
                                <span class="event-date-badge">
                                    <i class="far fa-calendar"></i> ${dateStr}
                                </span>
                                <span class="event-time">${event.time}</span>
                            </div>
                            <div class="event-title">${event.title}</div>
                            <div class="event-venue">
                                <i class="fas fa-map-marker-alt"></i> ${event.venue}
                            </div>
                        `;
                        
                        upcomingEventsList.appendChild(eventCard);
                    });
                } else {
                    upcomingEventsList.innerHTML = `
                        <div class="empty-events">
                            <i class="fas fa-calendar-plus"></i>
                            <p>No upcoming events</p>
                            <small>Click "Add New Event" to get started</small>
                        </div>
                    `;
                }
            }
            
            // Format event date for display
            function formatEventDate(date) {
                const options = { weekday: 'short', month: 'short', day: 'numeric' };
                return date.toLocaleDateString('en-US', options);
            }
            
            // Update stats
            function updateStats() {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                
                const totalGigs = events.length;
                const upcomingGigs = events.filter(e => {
                    const eventDate = new Date(e.date);
                    eventDate.setHours(0, 0, 0, 0);
                    return eventDate >= now;
                }).length;
                
                document.getElementById('totalGigs').textContent = totalGigs;
                document.getElementById('upcomingGigs').textContent = upcomingGigs;
            }
            
            // Show notification
            function showNotification(message, type = 'success') {
                const notification = document.createElement('div');
                notification.className = `notification ${type}`;
                notification.textContent = message;
                
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'fadeOut 0.3s ease';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
            
            // Close modal when clicking outside
            eventModal.addEventListener('click', (e) => {
                if (e.target === eventModal) {
                    closeEventModal();
                }
            });
        });
    </script>
</body>
