<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Account | Vivo Distro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="global-fullscreen.js" defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h2 {
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(90deg, #6C63FF, #FF6584);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .subtitle {
            color: #8892b0;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #6C63FF;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #6C63FF, #FF6584);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.3);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .username-taken {
            color: #F56565;
            font-size: 0.9rem;
            margin-top: 5px;
            display: none;
        }
        
        .password-requirements {
            color: #8892b0;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* ========== MOBILE RESPONSIVE FIXES ========== */
        @media screen and (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                width: 95%;
                max-width: 100%;
                padding: 30px 20px;
                margin: 20px auto;
            }
            
            h2 {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.95rem;
                margin-bottom: 25px;
            }
            
            input {
                padding: 14px;
                font-size: 16px; /* Prevents zoom on iOS */
            }
            
            label {
                font-size: 0.95rem;
            }
            
            .btn {
                padding: 15px;
                font-size: 1rem;
            }
            
            .password-requirements {
                font-size: 0.75rem;
            }
        }

        /* Extra small devices */
        @media screen and (max-width: 380px) {
            .container {
                padding: 25px 15px;
            }
            
            h2 {
                font-size: 1.6rem;
            }
            
            input {
                padding: 12px;
            }
            
            .btn {
                padding: 14px;
            }
        }

        /* Landscape mode optimization */
        @media screen and (max-height: 600px) and (orientation: landscape) {
            body {
                padding: 15px;
                align-items: flex-start;
            }
            
            .container {
                margin: 15px auto;
                padding: 25px;
            }
            
            h2 {
                font-size: 1.6rem;
                margin-bottom: 5px;
            }
            
            .subtitle {
                margin-bottom: 15px;
            }
            
            .form-group {
                margin-bottom: 12px;
            }
            
            input {
                padding: 12px;
            }
            
            .btn {
                padding: 12px;
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Create Account</h2>
        <p class="subtitle">Choose a username and password for future logins</p>
        
        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="e.g., djdivan" autocomplete="off">
            <div class="username-taken" id="usernameTaken">Username already taken</div>
        </div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="At least 6 characters">
            <div class="password-requirements">Minimum 6 characters</div>
        </div>
        
        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Re-enter password">
        </div>
        
        <button class="btn" id="createAccountBtn">Create Account</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://msjinuumxmezrijqemmp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zamludXVteG1lenJpanFlbW1wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwOTAyNjMsImV4cCI6MjA4NzY2NjI2M30.ic50fSC7MQfhSkhfE5E8B0R5-BGCQStMRZNHiy6Zakw';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.addEventListener('DOMContentLoaded', function() {
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');
            const createBtn = document.getElementById('createAccountBtn');
            const usernameTaken = document.getElementById('usernameTaken');

            // Get email from URL
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (!email) {
                window.location.href = 'signup.html';
            }

            // Check username availability
            let usernameCheckTimeout;
            usernameInput.addEventListener('input', function() {
                clearTimeout(usernameCheckTimeout);
                const username = this.value.trim();
                
                if (username.length < 3) return;
                
                usernameCheckTimeout = setTimeout(async () => {
                    const { data, error } = await supabase
                        .from('profiles')
                        .select('username')
                        .eq('username', username)
                        .maybeSingle();
                    
                    if (data) {
                        usernameTaken.style.display = 'block';
                        createBtn.disabled = true;
                    } else {
                        usernameTaken.style.display = 'none';
                        createBtn.disabled = false;
                    }
                }, 500);
            });

            // Create account
            createBtn.addEventListener('click', async function() {
                const username = usernameInput.value.trim();
                const password = passwordInput.value;
                const confirm = confirmInput.value;

                if (!username || !password) {
                    alert('Please fill in all fields');
                    return;
                }

                if (password.length < 6) {
                    alert('Password must be at least 6 characters');
                    return;
                }

                if (password !== confirm) {
                    alert('Passwords do not match');
                    return;
                }

                createBtn.disabled = true;
                createBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

                // Update user's password
                const { data: userData, error: updateError } = await supabase.auth.updateUser({
                    password: password
                });

                if (updateError) {
                    alert('Error: ' + updateError.message);
                    createBtn.disabled = false;
                    createBtn.innerHTML = 'Create Account';
                    return;
                }

                // Save username to profiles table
                const { error: profileError } = await supabase
                    .from('profiles')
                    .upsert({
                        id: userData.user.id,
                        username: username,
                        email: email
                    });

                if (profileError) {
                    console.error('Error saving username:', profileError);
                }

                // Save role from earlier
                const pending = localStorage.getItem('pendingSignIn');
                let role = 'performer';
                if (pending) {
                    const data = JSON.parse(pending);
                    role = data.role;
                    localStorage.removeItem('pendingSignIn');
                }

                alert('Account created! You can now log in with username/password');
                
                // Redirect to setup
                if (role === 'performer') window.location.href = 'performer-setup.html';
                else if (role === 'agent') window.location.href = 'agent-setup.html';
                else if (role === 'booker') window.location.href = 'booker-setup.html';
                else window.location.href = 'browse.html';
            });
        });
    </script>
</body>
</html>
